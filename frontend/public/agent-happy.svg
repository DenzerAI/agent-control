<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus happy"><style>.h-grp{transform-box:fill-box;transform-origin:center;animation:h-bounce 1.6s ease-in-out infinite}@keyframes h-bounce{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(0,-5px) scale(1.04)}}.h-bar{transform-box:fill-box;transform-origin:center;animation:h-br var(--dur) ease-in-out var(--delay) infinite}@keyframes h-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.92)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="h-grp"><rect class="h-bar" style="--delay:0.0s;--dur:2.2s" x="49" y="90" width="14" height="40" rx="7" fill="#1F1F1E"/><rect class="h-bar" style="--delay:0.15s;--dur:2.4s" x="71" y="75" width="14" height="60" rx="7" fill="#1F1F1E"/><rect class="h-bar" style="--delay:0.3s;--dur:2.6s" x="93" y="64" width="14" height="78" rx="7" fill="#1F1F1E"/><rect class="h-bar" style="--delay:0.45s;--dur:2.4s" x="115" y="75" width="14" height="60" rx="7" fill="#1F1F1E"/><rect class="h-bar" style="--delay:0.6s;--dur:2.2s" x="137" y="90" width="14" height="40" rx="7" fill="#1F1F1E"/></g></svg>
