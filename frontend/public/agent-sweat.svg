<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus sweat"><style>.sw-bar{transform-box:fill-box;transform-origin:center;animation:sw-br var(--dur) ease-in-out var(--delay) infinite}@keyframes sw-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.92)}}.sw-drop{transform-box:fill-box;transform-origin:165px 60px;animation:sw-fall 2.2s ease-in-out infinite}@keyframes sw-fall{0%{transform:translate(0,-8px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translate(0,30px);opacity:0}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><rect class="sw-bar" style="--delay:0.0s;--dur:3s" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="sw-bar" style="--delay:0.15s;--dur:3s" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="sw-bar" style="--delay:0.3s;--dur:3s" x="93" y="48" width="14" height="104" rx="7" fill="#1F1F1E"/><rect class="sw-bar" style="--delay:0.44999999999999996s;--dur:3s" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="sw-bar" style="--delay:0.6s;--dur:3s" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><g class="sw-drop"><path d="M165,52 C172,60 172,68 165,72 C158,68 158,60 165,52 Z" fill="#D97757"/></g></svg>
