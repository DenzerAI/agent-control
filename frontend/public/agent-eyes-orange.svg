<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus listening with orange eyes"><style>.i-float{transform-box:fill-box;transform-origin:center;animation:i-fl 5.2s ease-in-out infinite}@keyframes i-fl{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-3px)}}.i-sway{transform-box:fill-box;transform-origin:center;animation:i-sw 9s ease-in-out infinite}@keyframes i-sw{0%,100%{transform:translate(0,0)}25%{transform:translate(7px,0)}75%{transform:translate(-7px,0)}}.i-lid{transform-box:fill-box;transform-origin:center;animation:i-bl 5.5s ease-in-out infinite}@keyframes i-bl{0%,70%{transform:scaleY(1)}73%{transform:scaleY(0.06)}77%{transform:scaleY(1)}82%{transform:scaleY(0.06)}86%,100%{transform:scaleY(1)}}.i-pill{transform-box:fill-box;transform-origin:center;animation:i-br var(--dur) ease-in-out var(--delay) infinite,i-pulse 1.6s ease-in-out infinite}@keyframes i-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(var(--amp))}}@keyframes i-pulse{0%,100%{fill-opacity:1}50%{fill-opacity:0.45}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="i-float"><g class="i-sway"><g class="i-lid"><rect class="i-pill" style="--delay:0.0s;--amp:0.80;--dur:2.8s" x="49.0" y="71.0" width="14" height="58" rx="7.0" fill="#D97757"/><rect class="i-pill" style="--delay:0.25s;--amp:0.84;--dur:3.2s" x="71.0" y="59.0" width="14" height="82" rx="7.0" fill="#D97757"/><rect class="i-pill" style="--delay:0.5s;--amp:0.88;--dur:3.6s" x="93.0" y="48.0" width="14" height="104" rx="7.0" fill="#D97757"/><rect class="i-pill" style="--delay:0.75s;--amp:0.84;--dur:3.2s" x="115.0" y="59.0" width="14" height="82" rx="7.0" fill="#D97757"/><rect class="i-pill" style="--delay:1.0s;--amp:0.80;--dur:2.8s" x="137.0" y="71.0" width="14" height="58" rx="7.0" fill="#D97757"/></g></g></g></svg>
