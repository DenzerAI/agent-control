<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus squint"><style>.q-grp{transform-box:fill-box;transform-origin:center;animation:q-lean 3.5s ease-in-out infinite}@keyframes q-lean{0%,100%{transform:translate(0,0)}50%{transform:translate(4px,0)}}.q-p1{transform-box:fill-box;transform-origin:center;animation:q-sq1 3s ease-in-out infinite}@keyframes q-sq1{0%,100%{transform:scaleY(0.42)}50%{transform:scaleY(0.50)}}.q-p2{transform-box:fill-box;transform-origin:center;animation:q-sq2 3.4s ease-in-out infinite}@keyframes q-sq2{0%,100%{transform:scaleY(0.22)}50%{transform:scaleY(0.30)}}.q-p3{transform-box:fill-box;transform-origin:center;animation:q-sq3 3.2s ease-in-out infinite}@keyframes q-sq3{0%,100%{transform:scaleY(0.32)}50%{transform:scaleY(0.38)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="q-grp"><rect class="q-p1" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="q-p3" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="q-p2" x="93" y="70" width="14" height="60" rx="7" fill="#1F1F1E"/><rect class="q-p3" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="q-p1" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/></g></svg>
