<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus angry"><style>.a-grp{transform-box:fill-box;transform-origin:center;animation:a-tense 0.9s ease-in-out infinite}@keyframes a-tense{0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(1px,-1px)}75%{transform:translate(-1px,0)}}.a-brow-l{transform-box:fill-box;transform-origin:center;transform:rotate(-22deg)}.a-brow-r{transform-box:fill-box;transform-origin:center;transform:rotate(22deg)}.a-sq{transform-box:fill-box;transform-origin:center;animation:a-sq 2.4s ease-in-out infinite}@keyframes a-sq{0%,100%{transform:scaleY(0.30)}50%{transform:scaleY(0.36)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="a-grp"><rect class="a-brow-l" x="49" y="77" width="14" height="46" rx="7" fill="#D97757"/><rect class="a-sq" x="71" y="68" width="14" height="64" rx="7" fill="#1F1F1E"/><rect class="a-sq" x="93" y="60" width="14" height="80" rx="7" fill="#1F1F1E"/><rect class="a-sq" x="115" y="68" width="14" height="64" rx="7" fill="#1F1F1E"/><rect class="a-brow-r" x="137" y="77" width="14" height="46" rx="7" fill="#D97757"/></g></svg>
