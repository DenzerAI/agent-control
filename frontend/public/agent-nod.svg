<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus nod"><style>.n-grp{transform-box:fill-box;transform-origin:center;animation:n-nod 1.8s ease-in-out infinite}@keyframes n-nod{0%,100%{transform:translate(0,0)}20%{transform:translate(0,-4px)}35%{transform:translate(0,7px)}55%{transform:translate(0,-4px)}70%{transform:translate(0,7px)}85%{transform:translate(0,0)}}.n-pill{transform-box:fill-box;transform-origin:center;animation:n-br 3s ease-in-out var(--delay) infinite}@keyframes n-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.9)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="n-grp"><rect class="n-pill" style="--delay:0s" x="49.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/><rect class="n-pill" style="--delay:0.2s" x="71.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="n-pill" style="--delay:0.4s" x="93.0" y="48.0" width="14" height="104" rx="7.0" fill="#1F1F1E"/><rect class="n-pill" style="--delay:0.6s" x="115.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="n-pill" style="--delay:0.8s" x="137.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/></g></svg>
