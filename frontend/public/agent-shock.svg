<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus shock"><style>.sh-bar{transform-box:fill-box;transform-origin:center;animation:sh-tense 0.6s ease-in-out infinite}@keyframes sh-tense{0%,100%{transform:translate(0,0)}50%{transform:translate(0,1px)}}.sh-line{animation:sh-blink 0.8s ease-in-out var(--sd) infinite}@keyframes sh-blink{0%,100%{opacity:0.4}50%{opacity:1}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><rect class="sh-bar" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="sh-bar" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="sh-bar" x="93" y="48" width="14" height="104" rx="7" fill="#1F1F1E"/><rect class="sh-bar" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="sh-bar" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><line class="sh-line" style="--sd:0s" x1="60" y1="14" x2="60" y2="32" stroke="#D97757" stroke-width="3" stroke-linecap="round"/><line class="sh-line" style="--sd:0.15s" x1="80" y1="10" x2="80" y2="30" stroke="#D97757" stroke-width="3" stroke-linecap="round"/><line class="sh-line" style="--sd:0.3s" x1="100" y1="8" x2="100" y2="28" stroke="#D97757" stroke-width="3" stroke-linecap="round"/><line class="sh-line" style="--sd:0.45s" x1="120" y1="10" x2="120" y2="30" stroke="#D97757" stroke-width="3" stroke-linecap="round"/><line class="sh-line" style="--sd:0.6s" x1="140" y1="14" x2="140" y2="32" stroke="#D97757" stroke-width="3" stroke-linecap="round"/></svg>
