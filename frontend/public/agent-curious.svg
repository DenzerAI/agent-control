<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus curious"><style>.c-grp{transform-box:fill-box;transform-origin:center;animation:c-tilt 6s ease-in-out infinite}@keyframes c-tilt{0%,100%{transform:rotate(0deg) translate(0,0)}50%{transform:rotate(8deg) translate(6px,-3px)}}.c-pill{transform-box:fill-box;transform-origin:center;animation:c-br 3s ease-in-out var(--delay) infinite}@keyframes c-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.92)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="c-grp"><rect class="c-pill" style="--delay:0s;--amp:0.9;--dur:3.2s" x="49.0" y="68.0" width="14" height="64" rx="7.0" fill="#1F1F1E"/><rect class="c-pill" style="--delay:0.4s;--amp:0.92;--dur:3.6s" x="71.0" y="57.0" width="14" height="86" rx="7.0" fill="#1F1F1E"/><rect class="c-pill" style="--delay:0.8s;--amp:0.94;--dur:4.0s" x="93.0" y="48.0" width="14" height="104" rx="7.0" fill="#1F1F1E"/><rect class="c-pill" style="--delay:0.3s;--amp:0.92;--dur:3.6s" x="115.0" y="54.0" width="14" height="92" rx="7.0" fill="#1F1F1E"/><rect class="c-pill" style="--delay:0.6s;--amp:0.9;--dur:3.2s" x="137.0" y="64.0" width="14" height="72" rx="7.0" fill="#1F1F1E"/></g></svg>