<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus idle"><style>.i-float{transform-box:fill-box;transform-origin:center;animation:i-fl 5.2s ease-in-out infinite}@keyframes i-fl{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-3px)}}.i-sway{transform-box:fill-box;transform-origin:center;animation:i-sw 9s ease-in-out infinite}@keyframes i-sw{0%,100%{transform:translate(0,0)}25%{transform:translate(7px,0)}75%{transform:translate(-7px,0)}}.i-lid{transform-box:fill-box;transform-origin:center;animation:i-bl 5.5s ease-in-out infinite}@keyframes i-bl{0%,70%{transform:scaleY(1)}73%{transform:scaleY(0.06)}76%,100%{transform:scaleY(1)}}.i-pill{transform-box:fill-box;transform-origin:center;animation:i-br var(--dur) ease-in-out var(--delay) infinite}@keyframes i-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(var(--amp))}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="i-float"><g class="i-sway"><g class="i-lid"><rect class="i-pill" style="--delay:0.0s;--amp:0.8;--dur:2.8s" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="i-pill" style="--delay:0.25s;--amp:0.84;--dur:3.2s" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="i-pill" style="--delay:0.5s;--amp:0.88;--dur:3.6s" x="93" y="48" width="14" height="104" rx="7" fill="#1F1F1E"/><rect class="i-pill" style="--delay:0.75s;--amp:0.84;--dur:3.2s" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="i-pill" style="--delay:1.0s;--amp:0.8;--dur:2.8s" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/></g></g></g></svg>
