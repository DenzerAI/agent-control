<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus look-right"><style>.r-grp{transform-box:fill-box;transform-origin:center;animation:r-sh 4s ease-in-out infinite}@keyframes r-sh{0%,20%{transform:translate(0,0)}40%,80%{transform:translate(12px,0)}100%{transform:translate(0,0)}}.r-pill{transform-box:fill-box;transform-origin:center;animation:r-br 4s ease-in-out var(--delay) infinite}@keyframes r-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.95)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="r-grp"><rect class="r-pill" style="--delay:0s;--amp:0.9;--dur:3.2s" x="49.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/><rect class="r-pill" style="--delay:0.3s;--amp:0.92;--dur:3.6s" x="71.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="r-pill" style="--delay:0.6s;--amp:0.94;--dur:4.0s" x="93.0" y="48.0" width="14" height="104" rx="7.0" fill="#1F1F1E"/><rect class="r-pill" style="--delay:0.9s;--amp:0.92;--dur:3.6s" x="115.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="r-pill" style="--delay:1.2s;--amp:0.9;--dur:3.2s" x="137.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/></g></svg>