<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus thinking"><style>.t-pill{transform-box:fill-box;transform-origin:center;animation:t-br 6s ease-in-out var(--delay) infinite}@keyframes t-br{0%,100%{transform:scaleY(0.85)}50%{transform:scaleY(0.95)}}.t-look{transform-box:fill-box;transform-origin:center;animation:t-lk 10s ease-in-out infinite}@keyframes t-lk{0%,10%{transform:translate(0,-4px)}20%,45%{transform:translate(10px,-6px)}55%,80%{transform:translate(-10px,-6px)}90%,100%{transform:translate(0,-4px)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><g class="t-look"><rect class="t-pill" style="--delay:0.0s;--amp:0.9;--dur:3.2s" x="49.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/><rect class="t-pill" style="--delay:0.5s;--amp:0.92;--dur:3.6s" x="71.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="t-pill" style="--delay:1.0s;--amp:0.94;--dur:4.0s" x="93.0" y="48.0" width="14" height="104" rx="7.0" fill="#1F1F1E"/><rect class="t-pill" style="--delay:0.5s;--amp:0.92;--dur:3.6s" x="115.0" y="59.0" width="14" height="82" rx="7.0" fill="#1F1F1E"/><rect class="t-pill" style="--delay:0.0s;--amp:0.9;--dur:3.2s" x="137.0" y="71.0" width="14" height="58" rx="7.0" fill="#1F1F1E"/></g></svg>