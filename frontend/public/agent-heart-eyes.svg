<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus heart-eyes"><style>.he-bar{transform-box:fill-box;transform-origin:center;animation:he-br var(--dur) ease-in-out var(--delay) infinite}@keyframes he-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.94)}}.he-mid{animation:he-beat 1s ease-in-out infinite}@keyframes he-beat{0%,100%{transform:scaleY(1)}15%{transform:scaleY(1.15)}30%{transform:scaleY(1)}45%{transform:scaleY(1.12)}60%{transform:scaleY(1)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><rect class="he-bar" style="--delay:0s;--dur:2.6s" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="he-bar" style="--delay:0.2s;--dur:2.8s" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="he-bar he-mid" style="--delay:0s;--dur:1s" x="93" y="48" width="14" height="104" rx="7" fill="#D97757"/><rect class="he-bar" style="--delay:0.4s;--dur:2.8s" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="he-bar" style="--delay:0.6s;--dur:2.6s" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/></svg>
