<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Klaus idea"><style>.id-bar{transform-box:fill-box;transform-origin:center;animation:id-br var(--dur) ease-in-out var(--delay) infinite}@keyframes id-br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.94)}}.id-bulb{transform-box:fill-box;transform-origin:100px 30px;animation:id-glow 1.6s ease-in-out infinite}@keyframes id-glow{0%,100%{opacity:0.5;transform:scale(0.92)}50%{opacity:1;transform:scale(1.08)}}</style><circle cx="100" cy="100" r="92" fill="#E6E6E3"/><rect class="id-bar" style="--delay:0.0s;--dur:3s" x="49" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><rect class="id-bar" style="--delay:0.15s;--dur:3s" x="71" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="id-bar" style="--delay:0.3s;--dur:3s" x="93" y="48" width="14" height="104" rx="7" fill="#1F1F1E"/><rect class="id-bar" style="--delay:0.44999999999999996s;--dur:3s" x="115" y="59" width="14" height="82" rx="7" fill="#1F1F1E"/><rect class="id-bar" style="--delay:0.6s;--dur:3s" x="137" y="71" width="14" height="58" rx="7" fill="#1F1F1E"/><g class="id-bulb"><circle cx="100" cy="28" r="11" fill="#D97757"/><rect x="95" y="38" width="10" height="4" rx="1.5" fill="#D97757"/><line x1="100" y1="8" x2="100" y2="14" stroke="#D97757" stroke-width="2.5" stroke-linecap="round"/><line x1="83" y1="18" x2="87" y2="22" stroke="#D97757" stroke-width="2.5" stroke-linecap="round"/><line x1="117" y1="18" x2="113" y2="22" stroke="#D97757" stroke-width="2.5" stroke-linecap="round"/></g></svg>
